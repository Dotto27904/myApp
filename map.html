<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>図書館案内アプリ</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- 戻るボタン（ページ上部） -->
  <div style="text-align:left; margin:10px;">
    <button onclick="location.href='index.html'"
            style="padding:10px 20px; font-size:16px;">
      ← 戻る
    </button>
  </div>

　<h2>館内地図</h2>
  お探しの本のジャンルに最も近いボタンを押してください。

　<div id="buttons">
      <button onclick="highlight('zassi.png', '雑誌')">雑誌</button>

      <button onclick="highlight('seikatu.png', '旅行')">旅行</button>
      <button onclick="highlight('seikatu.png', '健康')">健康</button>
      <button onclick="highlight('seikatu.png', '園芸')">園芸</button>
      <button onclick="highlight('seikatu.png', '文化')">文化</button>

      <button onclick="highlight('kazoku.png', '料理')">料理</button>
      <button onclick="highlight('kazoku.png', 'ファッション')">ファッション</button>
      <button onclick="highlight('kazoku.png', '家事・育児')">家事・育児</button>

      <button onclick="highlight('zidou.png', '児童書・絵本')">児童書・絵本</button>

      <button onclick="highlight('YA.png', '中高生向けの本')">中高生向けの本</button>
      <button onclick="highlight('YA.png', 'ライトノベル')">ライトノベル</button>

      <button onclick="highlight('bizinesu.png', 'パソコン')">パソコン</button>
      <button onclick="highlight('bizinesu.png', '政治・経済')">政治・経済</button>
      <button onclick="highlight('bizinesu.png', 'お金')">お金</button>

      <button onclick="highlight('bunnko.png', '文庫（ライトノベル以外）')">文庫（ライトノベル以外）</button>

      <button onclick="highlight('ippann.png', '宗教・歴史・伝記')">宗教・歴史・伝記</button>
      <button onclick="highlight('ippann.png', '社会・自然科学')">社会・自然科学</button>
      <button onclick="highlight('ippann.png', '技術・産業・芸術')">技術・産業・芸術</button>
      <button onclick="highlight('ippann.png', 'スポーツ')">スポーツ</button>
      <button onclick="highlight('ippann.png', '文学')">文学</button>
    </div>

   <!-- 排架場所表示 -->
   <h2>場所</h2>
    <div id="message" style="margin: 15px; font-size: 18px; font-weight: bold;"></div>

　  <!-- 地図表示 -->
    <div id="map-container">
        <img id="map" src="map_1F.png" alt="地図">
        <img id="highlight" src="" alt="ハイライト" class="hidden">
    </div>

    <script src="js/app.js"></script>

</body>
</html>
