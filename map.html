<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>図書館案内アプリ</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- 戻るボタン（ページ上部） -->
  <div style="text-align:left; margin:10px;">
    <button onclick="location.href='index.html'"
            style="padding:10px 20px; font-size:16px;">
      ← 戻る
    </button>
  </div>

　<h2>館内地図</h2>
　お探しの本のジャンルに最も近いボタンを押してください。

    <div id="buttons">
	<button onclick="highlight('zassi.png')">雑誌</button>
        <button onclick="highlight('seikatu.png')">生活情報（旅行・健康・園芸・文化）</button>
        <button onclick="highlight('kazoku.png')">家族応援（料理・ファッション・育児）</button>
        <button onclick="highlight('zidou.png')">児童室（絵本）</button>
        <button onclick="highlight('YA.png')">ＹＡ（進学・ライトノベル）</button>
        <button onclick="highlight('bizinesu.png')">ビジネス（パソコン・政治経済・お金）</button>
        <button onclick="highlight('bunnko.png')">文庫（小説等）</button>
        <button onclick="highlight('ippann.png')">一般（上記以外）</button>
    </div>


    <div id="map-container">
        <img id="map" src="map_1F.png" alt="地図">
        <img id="highlight" src="" alt="ハイライト" class="hidden">
    </div>


    <script src="js/app.js"></script>

</body>
</html>
