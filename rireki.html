<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読み取り履歴</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>読み取り履歴7</h2>

<!-- 並び替えボタン -->
<div style="margin:10px; text-align:center;">
  <button onclick="renderBookList('title')">タイトル順で表示</button>
  <button onclick="renderBookList('author')">作者順で表示</button>
</div>

<!-- タブ分類 -->
<div id="tabs" style="margin:10px; text-align:center;">
  <button onclick="renderBookList(currentSort,'ア行')">ア行</button>
  <button onclick="renderBookList(currentSort,'カ行')">カ行</button>
  <button onclick="renderBookList(currentSort,'サ行')">サ行</button>
  <button onclick="renderBookList(currentSort,'タ行')">タ行</button>
  <button onclick="renderBookList(currentSort,'ナ行')">ナ行</button>
  <button onclick="renderBookList(currentSort,'ハ行')">ハ行</button>
  <button onclick="renderBookList(currentSort,'マ行')">マ行</button>
  <button onclick="renderBookList(currentSort,'ヤ行')">ヤ行</button>
  <button onclick="renderBookList(currentSort,'ラ行')">ラ行</button>
  <button onclick="renderBookList(currentSort,'ワ行')">ワ行</button>
  <button onclick="renderBookList(currentSort,'その他')">その他</button>
</div>

<!-- 上段：読み取りボタン or カメラ -->
<div id="top-area" style="margin:20px; text-align:center;">
  <button id="start-btn" style="padding:10px 20px; font-size:18px;">
    読み取りを開始
  </button>
</div>

<!-- 中段：読み取り終了ボタン -->
<div id="middle-area" style="margin:20px; text-align:center;"></div>

<!-- 下段：読み込んだ本一覧 -->
<div id="bottom-area" style="margin:20px;">
  <h3>読み込んだ本一覧</h3>
  <div id="book-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<script>
let currentSort = "title";

/* -----------------------------------
   カタカナ → ひらがな変換
----------------------------------- */
function kataToHira(str) {
    return str.replace(/[\u30A1-\u30F6]/g, function(match) {
        const chr = match.charCodeAt(0) - 0x60;
        return String.fromCharCode(chr);
    });
}

/* -----------------------------------
   fallback：タイトルから読みを生成（強化版）
----------------------------------- */
function fallbackYomi(title) {
    let t = title;

    // 全角カタカナ → ひらがな
    t = kataToHira(t);

    // 半角カナ → 全角 → ひらがな
    t = t.replace(/[\uFF65-\uFF9F]/g, s => {
        return kataToHira(s.normalize("NFKC"));
    });

    // 英字 → カタカナ → ひらがな
    t = t.replace(/[A-Za-z]/g, s => {
        const kana = String.fromCharCode(s.toUpperCase().charCodeAt(0) + 0x60);
        return kataToHira(kana);
    });

    // 数字 → よみ
    t = t.replace(/[0-9]/g, s => {
        const map = ["ぜろ","いち","に","さん","よん","ご","ろく","なな","はち","きゅう"];
        return map[parseInt(s)];
    });

    return t;
}

/* -----------------------------------
   OpenBD API（タイトル・著者・ヨミ）
----------------------------------- */
async function fetchBookInfo(isbn) {
    const url = `https://api.openbd.jp/v1/get?isbn=${isbn}`;
    const response = await fetch(url);
    const data = await response.json();

    if (!data[0]) return null;

    const summary = data[0].summary;
    const title = summary.title || "タイトル不明";
    const author = summary.author || "著者不明";

    let yomi = "";
    try {
        yomi = data[0].onix.DescriptiveDetail.TitleDetail.TitleElement.TitleText.collationkey || "";
    } catch(e) {
        yomi = "";
    }

    if (!yomi) {
        yomi = fallbackYomi(title);
    }

    // ひらがなで統一
    yomi = kataToHira(yomi);

    return { isbn, title, author, yomi };
}

/* -----------------------------------
   localStorage
----------------------------------- */
function getBooks() {
    return JSON.parse(localStorage.getItem("books") || "[]");
}

function saveBook(info) {
    const books = getBooks();
    books.push(info);
    localStorage.setItem("books", JSON.stringify(books));
    renderBookList(currentSort);
}

function deleteBook(index) {
    const books = getBooks();
    books.splice(index, 1);
    localStorage.setItem("books", JSON.stringify(books));
    renderBookList(currentSort);
}

/* -----------------------------------
   重複チェック（ISBNで判定）
----------------------------------- */
function isDuplicate(info) {
    const books = getBooks();
    return books.some(book => book.isbn === info.isbn);
}

/* -----------------------------------
   読み（ヨミ）から行を判定
----------------------------------- */
function getGroupFromYomi(yomi) {
    const first = yomi.charAt(0);

    if ("あいうえお".includes(first)) return "ア行";
    if ("かきくけこ".includes(first)) return "カ行";
    if ("さしすせそ".includes(first)) return "サ行";
    if ("たちつてと".includes(first)) return "タ行";
    if ("なにぬねの".includes(first)) return "ナ行";
    if ("はひふへほ".includes(first)) return "ハ行";
    if ("まみむめも".includes(first)) return "マ行";
    if ("やゆよ".includes(first)) return "ヤ行";
    if ("らりるれろ".includes(first)) return "ラ行";
    if ("わをん".includes(first)) return "ワ行";

    return "その他";
}

/* -----------------------------------
   一覧表示
----------------------------------- */
function renderBookList(sortType = "title", group = null) {
    currentSort = sortType;

    let books = getBooks();

    books.sort((a, b) => a[sortType].localeCompare(b[sortType]));

    if (group) {
        books = books.filter(book => getGroupFromYomi(book.yomi) === group);
    }

    const list = document.getElementById("book-list");
    list.innerHTML = "";

    books.forEach((book, index) => {
        const div = document.createElement("div");
        div.style.margin = "8px 0";
        div.style.padding = "8px";
        div.style.border = "1px solid #ccc";

        div.innerHTML = `
            <strong>${book.title}</strong><br>
            ${book.author}<br>
            <button onclick="deleteBook(${index})">削除</button>
        `;

        list.appendChild(div);
    });
}

/* -----------------------------------
   初期状態
----------------------------------- */
function showInitial() {
  document.getElementById("top-area").innerHTML = `
    <button id="start-btn" style="padding:10px 20px; font-size:18px;">
      読み取りを開始
    </button>
  `;
  document.getElementById("middle-area").innerHTML = "";

  document.getElementById("start-btn").onclick = showCamera;
}

/* -----------------------------------
   読み取り状態
----------------------------------- */
function showCamera() {

  document.getElementById("top-area").innerHTML = `
    <div id="camera" style="width:100%; max-width:400px; margin:auto;"></div>
  `;

  document.getElementById("middle-area").innerHTML = `
    <button id="stop-btn" style="padding:10px 20px; font-size:18px;">
      読み取りを終わる
    </button>
  `;

  document.getElementById("stop-btn").onclick = stopCamera;

  let isProcessing = false;
  let lastScanTime = 0;
  let lastCode = "";
  let duplicateAlertShown = false;

  Quagga.init({
      inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#camera'),
          constraints: { facingMode: "environment" }
      },
      decoder: { readers: ["ean_reader"] }
  }, function(err) {
      if (err) { console.log(err); return; }
      Quagga.start();
  });

  Quagga.onDetected(async function(data) {

      const now = Date.now();
      const code = data.codeResult.code;

      // 同じコードの連続検出を抑制
      if (code === lastCode && now - lastScanTime < 3000) {
          return;
      }
      lastCode = code;
      lastScanTime = now;

      if (isProcessing) return;
      isProcessing = true;

      const isbn = code;
      console.log("ISBN候補:", isbn);

      // ISBNフィルタ（978/979のみ採用）
      if (!isbn.startsWith("978") && !isbn.startsWith("979")) {
          console.log("ISBNではない:", isbn);
          isProcessing = false;
          return;
      }

      // 誤読チェック（13桁の数字）
      if (!isbn || isbn.length !== 13 || !/^\d{13}$/.test(isbn)) {
          console.log("誤読:", isbn);
          isProcessing = false;
          return;
      }

      const info = await fetchBookInfo(isbn);

      if (!info) {
          alert("書誌データがありません（OpenBDに情報がありません）");
          isProcessing = false;
          return;
      }

      // 重複チェック（ISBNで判定・アラートは1回だけ）
      if (isDuplicate(info)) {
          if (!duplicateAlertShown) {
              alert("この本はすでに登録されています");
              duplicateAlertShown = true;
          }
          Quagga.stop();
          showInitial();
          isProcessing = false;
          return;
      }

      const ok = confirm(
          `タイトル：${info.title}\n著者：${info.author}\n\n取り込みますか？`
      );

      if (ok) {
          saveBook(info);
      }

      Quagga.stop();
      showInitial();

      isProcessing = false;
  });
}

/* -----------------------------------
   カメラ停止（固まり防止）
----------------------------------- */
function stopCamera() {
  Quagga.stop();

  const cam = document.querySelector('#camera');
  if (cam) cam.innerHTML = "";

  showInitial();
}

/* -----------------------------------
   初期表示
----------------------------------- */
showInitial();
renderBookList();

</script>

</body>
</html>
