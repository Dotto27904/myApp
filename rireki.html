<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読書ノート13（バックアップ版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    .tab-button { padding:10px; margin:4px; font-size:18px; }
    input[type="text"] { width:90%; padding:4px; margin-top:4px; }
  </style>
</head>

<body>

<h2>読書ノート13（バックアップ版）</h2>

<div id="top-area" style="margin:20px; text-align:center;">
  <button onclick="startCamera()" style="padding:10px 20px; font-size:18px;">バーコード読み込み</button>
  <button onclick="backupJSON()" style="padding:10px 20px; font-size:18px; margin-left:10px;">バックアップ保存</button>
  <button onclick="restoreJSON()" style="padding:10px 20px; font-size:18px; margin-left:10px;">バックアップ復元</button>
  <input type="file" id="restore-file" style="display:none;" accept=".json">
</div>

<h3>タイトル別</h3>

<div id="tabs" style="margin:20px; text-align:center;">
  <button class="tab-button" onclick="renderBookList('title','ア行')">あ行</button>
  <button class="tab-button" onclick="renderBookList('title','カ行')">か行</button>
  <button class="tab-button" onclick="renderBookList('title','サ行')">さ行</button>
  <button class="tab-button" onclick="renderBookList('title','タ行')">た行</button>
  <button class="tab-button" onclick="renderBookList('title','ナ行')">な行</button>
  <button class="tab-button" onclick="renderBookList('title','ハ行')">は行</button>
  <button class="tab-button" onclick="renderBookList('title','マ行')">ま行</button>
  <button class="tab-button" onclick="renderBookList('title','ヤ行')">や行</button>
  <button class="tab-button" onclick="renderBookList('title','ラ行')">ら行</button>
  <button class="tab-button" onclick="renderBookList('title','ワ行')">わ行</button>
  <button class="tab-button" onclick="renderBookList('title','その他')">その他</button>
</div>

<div id="middle-area" style="margin:20px; text-align:center;"></div>

<div id="bottom-area" style="margin:20px;">
  <h3>読んだ本一覧</h3>
  <div id="book-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<script>
let currentSort = "title";
let currentGroup = "ア行";
let duplicateAlertShown = false;
let cameraStopped = false;
let lastCode = "";
let isProcessing = false;

/* -----------------------------------
   localStorage に保存するデータ本体
----------------------------------- */
function loadBooks() {
  const data = localStorage.getItem("booksData");
  return data ? JSON.parse(data) : [];
}

function saveBooks(data) {
  localStorage.setItem("booksData", JSON.stringify(data));
}

let booksData = loadBooks();

/* -----------------------------------
   バックアップ保存（JSONダウンロード）
----------------------------------- */
function backupJSON() {
  const blob = new Blob([JSON.stringify(booksData, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "books_backup.json";
  a.click();

  URL.revokeObjectURL(url);
  alert("バックアップを保存しました");
}

/* -----------------------------------
   バックアップ復元（JSON読み込み）
----------------------------------- */
function restoreJSON() {
  document.getElementById("restore-file").click();
}

document.getElementById("restore-file").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function() {
    try {
      booksData = JSON.parse(reader.result);
      saveBooks(booksData);
      alert("バックアップを復元しました");
      renderBookList(currentSort, currentGroup);
    } catch {
      alert("JSONの読み込みに失敗しました");
    }
  };
  reader.readAsText(file);
});

/* -----------------------------------
   カタカナ → ひらがな
----------------------------------- */
function kataToHira(str) {
  return str.replace(/[\u30A1-\u30F6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
}

/* -----------------------------------
   ヨミ生成
----------------------------------- */
function normalizeYomi(str) {
  if (!str) return "";
  let t = kataToHira(str);
  t = t.replace(/[・。、「」『』（）()\s]/g, "");
  return t;
}

function fallbackYomi(title) {
  return normalizeYomi(title);
}

/* -----------------------------------
   OpenBD API
----------------------------------- */
async function fetchBookInfo(isbn) {
  const url = `https://api.openbd.jp/v1/get?isbn=${isbn}`;
  const response = await fetch(url);
  const data = await response.json();

  if (!data[0]) return null;

  const summary = data[0].summary;
  const title = summary.title || "タイトル不明";
  const author = summary.author || "著者不明";

  let yomi = "";
  try {
    yomi = data[0].onix.DescriptiveDetail.TitleDetail.TitleElement.TitleText.collationkey || "";
  } catch {
    yomi = "";
  }

  if (!yomi) yomi = fallbackYomi(title);
  else yomi = normalizeYomi(yomi);

  return { isbn, title, author, yomi };
}

/* -----------------------------------
   重複チェック
----------------------------------- */
function isDuplicate(info) {
  return booksData.some(book => book.isbn === info.isbn);
}

/* -----------------------------------
   行判定
----------------------------------- */
function normalizeFirstKana(ch) {
  const map = {
    "が":"か","ぎ":"き","ぐ":"く","げ":"け","ご":"こ",
    "ざ":"さ","じ":"し","ず":"す","ぜ":"せ","ぞ":"そ",
    "だ":"た","ぢ":"ち","づ":"つ","で":"て","ど":"と",
    "ば":"は","び":"ひ","ぶ":"ふ","べ":"へ","ぼ":"ほ",
    "ぱ":"は","ぴ":"ひ","ぷ":"ふ","ぺ":"へ","ぽ":"ほ",
    "ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お",
    "ゃ":"や","ゅ":"ゆ","ょ":"よ","っ":"つ"
  };
  return map[ch] || ch;
}

function getGroupFromYomi(yomi) {
  if (!yomi) return "その他";
  const first = normalizeFirstKana(yomi.charAt(0));

  if ("あいうえお".includes(first)) return "ア行";
  if ("かきくけこ".includes(first)) return "カ行";
  if ("さしすせそ".includes(first)) return "サ行";
  if ("たちつてと".includes(first)) return "タ行";
  if ("なにぬねの".includes(first)) return "ナ行";
  if ("はひふへほ".includes(first)) return "ハ行";
  if ("まみむめも".includes(first)) return "マ行";
  if ("やゆよ".includes(first)) return "ヤ行";
  if ("らりるれろ".includes(first)) return "ラ行";
  if ("わをん".includes(first)) return "ワ行";

  return "その他";
}

/* -----------------------------------
   一覧表示
----------------------------------- */
function renderBookList(sortType = "title", group = null) {
  currentSort = sortType;
  if (group !== null) currentGroup = group;

  let books = [...booksData];
  books.sort((a, b) => (a[sortType] || "").localeCompare(b[sortType] || ""));
  books = books.filter(book => getGroupFromYomi(book.yomi) === currentGroup);

  const list = document.getElementById("book-list");
  list.innerHTML = "";

  books.forEach((book, idx) => {
    const div = document.createElement("div");
    div.style.margin = "8px 0";
    div.style.padding = "8px";
    div.style.border = "1px solid #ccc";

    div.innerHTML = `
      <strong>${book.title}</strong><br>
      著者：${book.author}<br>
      ヨミ：${book.yomi}<br>
      ISBN：${book.isbn}<br>
      <button onclick="editBook(${idx})">編集</button>
      <button onclick="deleteBook(${idx})">削除</button>
    `;

    list.appendChild(div);
  });
}

/* -----------------------------------
   編集
----------------------------------- */
function editBook(index) {
  const book = booksData[index];
  document.getElementById("top-area").innerHTML = `
    <div style="padding:20px;">
      <h3>編集</h3>
      タイトル：<br>
      <input id="e-title" value="${book.title}"><br><br>

      著者：<br>
      <input id="e-author" value="${book.author}"><br><br>

      ヨミ：<br>
      <input id="e-yomi" value="${book.yomi}"><br>
      <button onclick="autoEditYomi()">ヨミ自動生成</button><br><br>

      ISBN：<br>
      <input id="e-isbn" value="${book.isbn}" readonly><br><br>

      <button onclick="applyEdit(${index})">保存</button>
      <button onclick="showInitial()">キャンセル</button>
    </div>
  `;
}

function autoEditYomi() {
  const title = document.getElementById("e-title").value;
  document.getElementById("e-yomi").value = fallbackYomi(title);
}

function applyEdit(index) {
  booksData[index] = {
    title: document.getElementById("e-title").value,
    author: document.getElementById("e-author").value,
    yomi: document.getElementById("e-yomi").value,
    isbn: document.getElementById("e-isbn").value
  };
  saveBooks(booksData);
  showInitial();
}

/* -----------------------------------
   削除
----------------------------------- */
function deleteBook(index) {
  if (!confirm("削除しますか？")) return;
  booksData.splice(index, 1);
  saveBooks(booksData);
  renderBookList(currentSort, currentGroup);
}

/* -----------------------------------
   手動登録
----------------------------------- */
function showManualEntryForm(isbn) {
  document.getElementById("top-area").innerHTML = `
    <div style="padding:20px;">
      <h3>手動登録</h3>
      タイトル：<br>
      <input id="m-title"><br><br>

      著者：<br>
      <input id="m-author"><br><br>

      ヨミ：<br>
      <input id="m-yomi"><br>
      <button onclick="autoYomi()">ヨミ自動生成</button><br><br>

      ISBN：<br>
      <input id="m-isbn" value="${isbn}" readonly><br><br>

      <button onclick="manualSave()">登録する</button>
      <button onclick="showInitial()">キャンセル</button>
    </div>
  `;
}

function autoYomi() {
  const title = document.getElementById("m-title").value;
  document.getElementById("m-yomi").value = fallbackYomi(title);
}

function manualSave() {
  const info = {
    title: document.getElementById("m-title").value,
    author: document.getElementById("m-author").value,
    yomi: document.getElementById("m-yomi").value,
    isbn: document.getElementById("m-isbn").value
  };

  if (!info.title || !info.yomi) {
    alert("タイトルとヨミは必須です");
    return;
  }

  if (isDuplicate(info)) {
    alert("この本はすでに登録されています");
    showInitial();
    return;
  }

  booksData.push(info);
  saveBooks(booksData);
  alert("登録しました");
  showInitial();
}

/* -----------------------------------
   初期表示
----------------------------------- */
function showInitial() {
  duplicateAlertShown = false;

  document.getElementById("top-area").innerHTML = `
    <button onclick="startCamera()" style="padding:10px 20px; font-size:18px;">バーコード読み込み</button>
    <button onclick="backupJSON()" style="padding:10px 20px; font-size:18px; margin-left:10px;">バックアップ保存</button>
    <button onclick="restoreJSON()" style="padding:10px 20px; font-size:18px; margin-left:10px;">バックアップ復元</button>
    <input type="file" id="restore-file" style="display:none;" accept=".json">
  `;

  renderBookList(currentSort, currentGroup);
}

/* -----------------------------------
   カメラ起動
----------------------------------- */
function startCamera() {
  duplicateAlertShown = false;
  cameraStopped = false;
  isProcessing = false;
  lastCode = "";

  document.getElementById("top-area").innerHTML = `
    <div id="camera" style="width:100%; max-width:400px; margin:auto;"></div>
  `;

  document.getElementById("middle-area").innerHTML = `
    <button onclick="stopCamera()" style="padding:10px 20px; font-size:18px;">読み取りを終わる</button>
  `;

  let lastScanTime = 0;

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#camera'),
      constraints: { facingMode: "environment" }
    },
    decoder: { readers: ["ean_reader"] }
  }, function(err) {
    if (err) { console.log(err); return; }
    Quagga.start();
  });

  Quagga.onDetected(async function(data) {
    if (cameraStopped) return;

    const now = Date.now();
    const code = data.codeResult.code;

    if (!code.startsWith("978") && !code.startsWith("979")) return;

    if (code === lastCode && now - lastScanTime < 3000) return;

    lastCode = code;
    lastScanTime = now;

    if (isProcessing) return;
    isProcessing = true;

    const isbn = code;
    const info = await fetchBookInfo(isbn);

    if (!info) {
      alert("書誌データがありません（OpenBDに情報なし）\n手動登録できます。");
      cameraStopped = true;
      Quagga.stop();
      showManualEntryForm(isbn);
      isProcessing = false;
      return;
    }

    if (isDuplicate(info)) {
      if (!duplicateAlertShown) {
        alert("この本はすでに登録されています");
        duplicateAlertShown = true;
      }
      cameraStopped = true;
      Quagga.stop();
      showInitial();
      isProcessing = false;
      return;
    }

    const ok = confirm(
      `タイトル：${info.title}\n著者：${info.author}\n\n取り込みますか？`
    );

    if (ok) {
      booksData.push(info);
      saveBooks(booksData);
      alert("登録しました");
      cameraStopped = true;
      Quagga.stop();
      showInitial();
      isProcessing = false;
      return;
    }

    cameraStopped = true;
    Quagga.stop();
    showInitial();
    isProcessing = false;
  });
}

/* -----------------------------------
   カメラ停止
----------------------------------- */
function stopCamera() {
  cameraStopped = true;
  Quagga.stop();
  const cam = document.querySelector('#camera');
  if (cam) cam.innerHTML = "";
  showInitial();
}

/* -----------------------------------
   初期表示
----------------------------------- */
showInitial();

</script>

</body>
</html>
