<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読書ノート12.8（最新版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .tab-button {
      padding: 10px 15px;
      margin: 4px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #666;
      background-color: #f0f0f0;
    }
    .tab-button:hover {
      background-color: #e0e0e0;
    }
    input[type="text"] {
      width: 90%;
      padding: 4px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <!-- 戻るボタン -->
  <div style="text-align:left; margin:10px;">
    <button onclick="location.href='index.html'"
            style="padding:10px 20px; font-size:16px;">
      ← 戻る
    </button>
  </div>

<h2>読書ノート12.8（最新版）</h2>
読み取りボタンを押して、カメラで本のバーコードを読み込んでください。<br>
OpenBD にデータが無い場合は、手動登録できます。<br>
よみは「ひらがな＋英字＋数字＋ー」のみ入力できます。

<!-- 上段：読み取りボタン＋手動登録ボタン -->
<div id="top-area" style="margin:20px; text-align:center;">
  <button id="start-btn" style="padding:10px 20px; font-size:18px;">
    バーコード読み込み
  </button>
  <button id="manual-btn" style="padding:10px 20px; font-size:18px; margin-left:10px;">
    手動登録
  </button>
</div>

<h3>タイトル別</h3>

<!-- タブ分類 -->
<div id="tabs" style="margin:20px; text-align:center;">
  <button class="tab-button" onclick="renderBookList(currentSort,'ア行')">あ行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'カ行')">か行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'サ行')">さ行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'タ行')">た行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ナ行')">な行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ハ行')">は行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'マ行')">ま行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ヤ行')">や行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ラ行')">ら行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ワ行')">わ行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'その他')">その他</button>
</div>

<!-- 中段：読み取り終了ボタン -->
<div id="middle-area" style="margin:20px; text-align:center;"></div>

<!-- 下段：読み込んだ本一覧 -->
<div id="bottom-area" style="margin:20px;">
  <h3>読んだ本一覧</h3>
  <div id="book-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<script>
let currentSort = "yomi";
let currentGroup = "ア行";
let duplicateAlertShown = false;
let cameraStopped = false;
let lastCode = "";
let isProcessing = false;

/* -----------------------------------
   カタカナ → ひらがな変換
----------------------------------- */
function kataToHira(str) {
  return str.replace(/[\u30A1-\u30F6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
}

/* -----------------------------------
   ヨミ生成
----------------------------------- */
function normalizeYomi(str) {
  if (!str) return "";
  let t = kataToHira(str);
  t = t.replace(/[・。、「」『』（）()\s]/g, "");
  return t;
}

function fallbackYomi(title) {
  return normalizeYomi(title);
}

/* -----------------------------------
   OpenBD API
----------------------------------- */
async function fetchBookInfo(isbn) {
  const url = `https://api.openbd.jp/v1/get?isbn=${isbn}`;
  const response = await fetch(url);
  const data = await response.json();

  if (!data[0]) return null;

  const summary = data[0].summary;
  const title = summary.title || "タイトル不明";
  const author = summary.author || "著者不明";

  let yomi = "";
  try {
    yomi = data[0].onix.DescriptiveDetail.TitleDetail.TitleElement.TitleText.collationkey || "";
  } catch {
    yomi = "";
  }

  if (!yomi) yomi = fallbackYomi(title);
  else yomi = normalizeYomi(yomi);

  return { isbn, title, author, yomi };
}

/* -----------------------------------
   localStorage
----------------------------------- */
function getBooks() {
  return JSON.parse(localStorage.getItem("books") || "[]");
}

function saveBook(info) {
  const books = getBooks();
  books.push(info);
  localStorage.setItem("books", JSON.stringify(books));

  currentGroup = getGroupFromYomi(info.yomi);
  alert("登録完了");

  // ★ 表示は呼び出し側で行う（ここでは描画しない）
}

/* -----------------------------------
   重複チェック（ISBN空欄は重複扱いしない）
----------------------------------- */
function isDuplicate(info) {
  if (!info.isbn) return false;
  return getBooks().some(book => book.isbn === info.isbn);
}

/* -----------------------------------
   行判定
----------------------------------- */
function normalizeFirstKana(ch) {
  const map = {
    "が":"か","ぎ":"き","ぐ":"く","げ":"け","ご":"こ",
    "ざ":"さ","じ":"し","ず":"す","ぜ":"せ","ぞ":"そ",
    "だ":"た","ぢ":"ち","づ":"つ","で":"て","ど":"と",
    "ば":"は","び":"ひ","ぶ":"ふ","べ":"へ","ぼ":"ほ",
    "ぱ":"は","ぴ":"ひ","ぷ":"ふ","ぺ":"へ","ぽ":"ほ",
    "ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お",
    "ゃ":"や","ゅ":"ゆ","ょ":"よ",
    "っ":"つ"
  };
  return map[ch] || ch;
}

function getGroupFromYomi(yomi) {
  if (!yomi) return "その他";
  const first = normalizeFirstKana(yomi.charAt(0));

  if ("あいうえお".includes(first)) return "ア行";
  if ("かきくけこ".includes(first)) return "カ行";
  if ("さしすせそ".includes(first)) return "サ行";
  if ("たちつてと".includes(first)) return "タ行";
  if ("なにぬねの".includes(first)) return "ナ行";
  if ("はひふへほ".includes(first)) return "ハ行";
  if ("まみむめも".includes(first)) return "マ行";
  if ("やゆよ".includes(first)) return "ヤ行";
  if ("らりるれろ".includes(first)) return "ラ行";
  if ("わをん".includes(first)) return "ワ行";

  return "その他";
}

/* -----------------------------------
   一覧表示（yomiソート＋新規登録を先頭に）
----------------------------------- */
function renderBookList(sortType = "yomi", group = null, topIsbn = null) {
  currentSort = sortType;
  if (group !== null) currentGroup = group;

  const allBooks = getBooks();
  let books = [...allBooks];

  books = books.filter(book => getGroupFromYomi(book.yomi) === currentGroup);
  books.sort((a, b) => (a.yomi || "").localeCompare(b.yomi || ""));

  // ★ 新規登録した本を先頭に移動
  if (topIsbn) {
    const idx = books.findIndex(b => b.isbn === topIsbn);
    if (idx > -1) {
      const [target] = books.splice(idx, 1);
      books.unshift(target);
    }
  }

  const list = document.getElementById("book-list");
  list.innerHTML = "";

  books.forEach((book) => {
    const originalIndex = allBooks.findIndex(b => b.isbn === book.isbn);

    const div = document.createElement("div");
    div.style.margin = "8px 0";
    div.style.padding = "8px";
    div.style.border = "1px solid #ccc";

    div.innerHTML = `
      <strong>${book.title}</strong><br>
      著者：${book.author}<br>
      よみ：${book.yomi}<br>
      ISBN：${book.isbn}<br>
      <button onclick="editBook(${originalIndex})">編集</button>
      <button onclick="deleteBook(${originalIndex})">削除</button>
    `;

    list.appendChild(div);
  });
}

/* -----------------------------------
   編集画面
----------------------------------- */
function editBook(index) {
  const book = getBooks()[index];

  document.getElementById("top-area").innerHTML = `
    <div style="padding:20px;">
      <h3>編集</h3>

      ISBN：<br>
      <input id="e-isbn" value="${book.isbn}" readonly><br><br>

      タイトル：<br>
      <input id="e-title" value="${book.title}"><br><br>

      著者：<br>
      <input id="e-author" value="${book.author}"><br><br>

      よみ：<br>
      <input id="e-yomi" value="${book.yomi}"
             oninput="this.value = this.value.replace(/[^ぁ-んa-zA-Z0-9ー]/g, '');"><br><br>

      <button onclick="applyEdit(${index})">保存</button>
      <button onclick="showInitial()">キャンセル</button>
    </div>
  `;
}

function applyEdit(index) {
  const info = {
    isbn: document.getElementById("e-isbn").value,
    title: document.getElementById("e-title").value,
    author: document.getElementById("e-author").value,
    yomi: document.getElementById("e-yomi").value
  };

  updateBook(index, info);
  alert("更新しました");
  showInitial();
}

/* -----------------------------------
   手動登録フォーム（ISBN空欄OK）
----------------------------------- */
function showManualEntryForm() {
  document.getElementById("top-area").innerHTML = `
    <div style="padding:20px;">
      <h3>手動登録</h3>

      ISBN：<br>
      <input id="m-isbn" type="text" value=""><br><br>

      タイトル：<br>
      <input id="m-title" type="text"><br><br>

      著者：<br>
      <input id="m-author" type="text"><br><br>

      よみ：<br>
      <input id="m-yomi" type="text"
             oninput="this.value = this.value.replace(/[^ぁ-んa-zA-Z0-9ー]/g, '');"><br><br>

      <button onclick="manualSave()">登録する</button>
      <button onclick="showInitial()">キャンセル</button>
    </div>
  `;
}

function manualSave() {
  const info = {
    isbn: document.getElementById("m-isbn").value,
    title: document.getElementById("m-title").value,
    author: document.getElementById("m-author").value,
    yomi: document.getElementById("m-yomi").value
  };

  if (!info.title || !info.yomi) {
    alert("タイトル・よみは必須です");
    return;
  }

  if (isDuplicate(info)) {
    alert("この本はすでに登録されています");
    showInitial();
    return;
  }

  saveBook(info);

  const group = getGroupFromYomi(info.yomi);
  renderBookList("yomi", group, info.isbn || null);

  alert("登録しました");
  showInitial();
}

/* -----------------------------------
   初期状態（一覧は描画しない）
----------------------------------- */
function showInitial() {
  duplicateAlertShown = false;

  document.getElementById("top-area").innerHTML = `
    <button id="start-btn" style="padding:10px 20px; font-size:18px;">
      バーコード読み込み
    </button>
    <button id="manual-btn" style="padding:10px 20px; font-size:18px; margin-left:10px;">
      手動登録
    </button>
  `;
  document.getElementById("middle-area").innerHTML = "";

  document.getElementById("start-btn").onclick = showCamera;
  document.getElementById("manual-btn").onclick = () => showManualEntryForm();
}

/* -----------------------------------
   読み取り状態
----------------------------------- */
function showCamera() {
  duplicateAlertShown = false;
  cameraStopped = false;
  isProcessing = false;
  lastCode = "";

  document.getElementById("top-area").innerHTML = `
    <div id="camera" style="width:100%; max-width:400px; margin:auto;"></div>
  `;

  document.getElementById("middle-area").innerHTML = `
    <button id="stop-btn" style="padding:10px 20px; font-size:18px;">
      読み取りを終わる
    </button>
  `;

  document.getElementById("stop-btn").onclick = stopCamera;

  let lastScanTime = 0;

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#camera'),
      constraints: { facingMode: "environment" }
    },
    decoder: { readers: ["ean_reader"] }
  }, function(err) {
    if (err) { console.log(err); return; }
    Quagga.start();
  });

  Quagga.onDetected(async function(data) {
    if (cameraStopped) return;

    const now = Date.now();
    const code = data.codeResult.code;

    if (!code.startsWith("978") && !code.startsWith("979")) return;

    if (code === lastCode && now - lastScanTime < 3000) return;

    lastCode = code;
    lastScanTime = now;

    if (isProcessing) return;
    isProcessing = true;

    const isbn = code;
    const info = await fetchBookInfo(isbn);

    if (!info) {
      alert("書誌データがありません（OpenBDに情報なし）\n手動登録できます。");

      cameraStopped = true;
      Quagga.stop();

      showManualEntryForm();

      isProcessing = false;
      return;
    }

    if (isDuplicate(info)) {
      if (!duplicateAlertShown) {
        alert("この本はすでに登録されています");
        duplicateAlertShown = true;
      }
      cameraStopped = true;
      Quagga.stop();
      showInitial();
      isProcessing = false;
      return;
    }

    const ok = confirm(
      `タイトル：${info.title}\n著者：${info.author}\n\n取り込みますか？`
    );

    if (ok) {
      saveBook(info);

      const group = getGroupFromYomi(info.yomi);
      renderBookList("yomi", group, info.isbn);

      cameraStopped = true;
      Quagga.stop();
      isProcessing = false;

      // ★ showInitial() を呼ばない（一覧を保持する）
      document.getElementById("top-area").innerHTML = `
        <button id="start-btn" style="padding:10px 20px; font-size:18px;">
          バーコード読み込み
        </button>
        <button id="manual-btn" style="padding:10px 20px; font-size:18px; margin-left:10px;">
          手動登録
        </button>
      `;
      document.getElementById("start-btn").onclick = showCamera;
      document.getElementById("manual-btn").onclick = () => showManualEntryForm();

      return;
    }

    cameraStopped = true;
    Quagga.stop();
    showInitial();
    isProcessing = false;
  });
}

/* -----------------------------------
   カメラ停止
----------------------------------- */
function stopCamera() {
  cameraStopped = true;
  Quagga.stop();
  const cam = document.querySelector('#camera');
  if (cam) cam.innerHTML = "";
  showInitial();
}

/* -----------------------------------
   初期表示
----------------------------------- */
showInitial();
</script>

</body>
</html>
