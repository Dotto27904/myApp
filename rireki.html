<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読書ノート</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .tab-button {
      padding: 10px 15px;
      margin: 4px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #666;
      background-color: #f0f0f0;
    }
    .tab-button:hover {
      background-color: #e0e0e0;
    }
  </style>
</head>

<body>

<h2>読書ノート6</h2>
読み取りボタンを押して、カメラで本のバーコードを読み込んでください。<br>
読み込んだデータは、本のタイトルごとに表示することができます。<br>
稀にうまく読み込めないことがあるので、その場合は、編集ボタンから入力してください。

<!-- 上段：読み取りボタン or カメラ -->
<div id="top-area" style="margin:20px; text-align:center;">
  <button id="start-btn" style="padding:10px 20px; font-size:18px;">
    バーコード読み込み
  </button>
</div>

<h3>タイトル別</h3>

<!-- タブ分類 -->
<div id="tabs" style="margin:20px; text-align:center;">
  <button class="tab-button" onclick="renderBookList(currentSort,'ア行')">あ行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'カ行')">か行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'サ行')">さ行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'タ行')">た行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ナ行')">な行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ハ行')">は行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'マ行')">ま行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ヤ行')">や行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ラ行')">ら行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'ワ行')">わ行</button>
  <button class="tab-button" onclick="renderBookList(currentSort,'その他')">その他</button>
</div>

<!-- 中段：読み取り終了ボタン -->
<div id="middle-area" style="margin:20px; text-align:center;"></div>

<!-- 下段：読み込んだ本一覧 -->
<div id="bottom-area" style="margin:20px;">
  <h3>読んだ本一覧</h3>
  <div id="book-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<script>
let currentSort = "title";
let currentGroup = "ア行";   // 現在表示中の行（フィルタ維持用）
let duplicateAlertShown = false; // ★ 重複アラートの状態をグローバル管理

/* -----------------------------------
   カタカナ → ひらがな変換
----------------------------------- */
function kataToHira(str) {
    return str.replace(/[\u30A1-\u30F6]/g, function(match) {
        const chr = match.charCodeAt(0) - 0x60;
        return String.fromCharCode(chr);
    });
}

/* -----------------------------------
   ヨミ用：ひらがなに統一＋記号除去
----------------------------------- */
function normalizeYomi(str) {
    if (!str) return "";
    let t = str;

    t = kataToHira(t);
    t = t.replace(/[\uFF65-\uFF9F]/g, s => kataToHira(s.normalize("NFKC")));
    t = t.replace(/[A-Za-z]/g, s => kataToHira(String.fromCharCode(s.toUpperCase().charCodeAt(0) + 0x60)));
    t = t.replace(/[0-9]/g, s => ["ぜろ","いち","に","さん","よん","ご","ろく","なな","はち","きゅう"][parseInt(s)]);
    t = t.replace(/[・。、「」『』（）()\s]/g, "");

    return t;
}

/* -----------------------------------
   fallback：タイトルから読みを生成
----------------------------------- */
function fallbackYomi(title) {
    return normalizeYomi(title);
}

/* -----------------------------------
   OpenBD API
----------------------------------- */
async function fetchBookInfo(isbn) {
    const url = `https://api.openbd.jp/v1/get?isbn=${isbn}`;
    const response = await fetch(url);
    const data = await response.json();

    if (!data[0]) return null;

    const summary = data[0].summary;
    const title = summary.title || "タイトル不明";
    const author = summary.author || "著者不明";

    let yomi = "";
    try {
        yomi = data[0].onix.DescriptiveDetail.TitleDetail.TitleElement.TitleText.collationkey || "";
    } catch(e) {
        yomi = "";
    }

    if (!yomi) yomi = fallbackYomi(title);
    else yomi = normalizeYomi(yomi);

    return { isbn, title, author, yomi };
}

/* -----------------------------------
   localStorage
----------------------------------- */
function getBooks() {
    return JSON.parse(localStorage.getItem("books") || "[]");
}

function saveBook(info) {
    const books = getBooks();
    books.push(info);
    localStorage.setItem("books", JSON.stringify(books));

    // 登録された本のヨミから行を判定して、その行へ遷移
    const group = getGroupFromYomi(info.yomi);
    alert("登録完了");
    renderBookList("title", group);
}

function updateBook(index, info) {
    const books = getBooks();
    books[index] = info;
    localStorage.setItem("books", JSON.stringify(books));
    renderBookList(currentSort, currentGroup);
}

function deleteBook(index) {
    const books = getBooks();
    books.splice(index, 1);
    localStorage.setItem("books", JSON.stringify(books));
    renderBookList(currentSort, currentGroup); // ★ フィルタ維持
}

/* -----------------------------------
   重複チェック（ISBN）
----------------------------------- */
function isDuplicate(info) {
    return getBooks().some(book => book.isbn === info.isbn);
}

/* -----------------------------------
   濁音・半濁音を行判定用に正規化
----------------------------------- */
function normalizeFirstKana(ch) {
    const map = {
        "が":"か","ぎ":"き","ぐ":"く","げ":"け","ご":"こ",
        "ざ":"さ","じ":"し","ず":"す","ぜ":"せ","ぞ":"そ",
        "だ":"た","ぢ":"ち","づ":"つ","で":"て","ど":"と",
        "ば":"は","び":"ひ","ぶ":"ふ","べ":"へ","ぼ":"ほ",
        "ぱ":"は","ぴ":"ひ","ぷ":"ふ","ぺ":"へ","ぽ":"ほ",
        "ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お",
        "ゃ":"や","ゅ":"ゆ","ょ":"よ","っ":"つ"
    };
    return map[ch] || ch;
}

/* -----------------------------------
   読み（ヨミ）から行を判定
----------------------------------- */
function getGroupFromYomi(yomi) {
    if (!yomi) return "その他";
    const first = normalizeFirstKana(yomi.charAt(0));

    if ("あいうえお".includes(first)) return "ア行";
    if ("かきくけこ".includes(first)) return "カ行";
    if ("さしすせそ".includes(first)) return "サ行";
    if ("たちつてと".includes(first)) return "タ行";
    if ("なにぬねの".includes(first)) return "ナ行";
    if ("はひふへほ".includes(first)) return "ハ行";
    if ("まみむめも".includes(first)) return "マ行";
    if ("やゆよ".includes(first)) return "ヤ行";
    if ("らりるれろ".includes(first)) return "ラ行";
    if ("わをん".includes(first)) return "ワ行";

    return "その他";
}

/* -----------------------------------
   編集ダイアログ
----------------------------------- */
function editBook(index) {
    const books = getBooks();
    const book = books[index];

    const newTitle = prompt("タイトルを編集", book.title);
    if (newTitle === null) return;

    const newAuthor = prompt("著者を編集", book.author);
    if (newAuthor === null) return;

    const newYomi = prompt("ヨミ（ひらがな）を編集", book.yomi);
    if (newYomi === null) return;

    const updated = {
        isbn: book.isbn,
        title: newTitle,
        author: newAuthor,
        yomi: normalizeYomi(newYomi)
    };

    updateBook(index, updated);
}

/* -----------------------------------
   一覧表示
----------------------------------- */
function renderBookList(sortType = "title", group = null) {
    currentSort = sortType;

    // ★ 修正：null と undefined の両方を判定
    if (group !== null && group !== undefined) {
        currentGroup = group;
    }

    const allBooks = getBooks();
    let books = [...allBooks];

    books.sort((a, b) => a[sortType].localeCompare(b[sortType]));

    books = books.filter(book => getGroupFromYomi(book.yomi) === currentGroup);

    const list = document.getElementById("book-list");
    list.innerHTML = "";

    books.forEach((book) => {
        const originalIndex = allBooks.findIndex(b => b.isbn === book.isbn);

        const div = document.createElement("div");
        div.style.margin = "8px 0";
        div.style.padding = "8px";
        div.style.border = "1px solid #ccc";

        div.innerHTML = `
            <strong>${book.title}</strong><br>
            著者：${book.author}<br>
            ヨミ：${book.yomi}<br>
            ISBN：${book.isbn}<br>
            <button onclick="editBook(${originalIndex})">編集</button>
            <button onclick="deleteBook(${originalIndex})">削除</button>
        `;

        list.appendChild(div);
    });
}

/* -----------------------------------
   初期状態
----------------------------------- */
function showInitial() {

  duplicateAlertShown = false;   // ★ 初期状態で必ずリセット

  document.getElementById("top-area").innerHTML = `
    <button id="start-btn" style="padding:10px 20px; font-size:18px;">
      バーコード読み込み
    </button>
  `;
  document.getElementById("middle-area").innerHTML = "";

  document.getElementById("start-btn").onclick = showCamera;

  // ページ読み込み時は「あ行」を表示
  currentGroup = "ア行";
  renderBookList("title", "ア行");
}

/* -----------------------------------
   読み取り状態
----------------------------------- */
function showCamera() {

  duplicateAlertShown = false;   // ★ 読み取り開始時に必ずリセット

  document.getElementById("top-area").innerHTML = `
    <div id="camera" style="width:100%; max-width:400px; margin:auto;"></div>
  `;

  document.getElementById("middle-area").innerHTML = `
    <button id="stop-btn" style="padding:10px 20px; font-size:18px;">
      読み取りを終わる
    </button>
  `;

  document.getElementById("stop-btn").onclick = stopCamera;

  let isProcessing = false;
  let lastScanTime = 0;
  let lastCode = "";

  Quagga.init({
      inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#camera'),
          constraints: { facingMode: "environment" }
      },
      decoder: { readers: ["ean_reader"] }
  }, function(err) {
      if (err) { console.log(err); return; }
      Quagga.start();
  });

  Quagga.onDetected(async function(data) {

      // ★ カメラ停止後の二重発火を防ぐ
      if (!Quagga.running) return;

      const now = Date.now();
      const code = data.codeResult.code;

      if (code === lastCode && now - lastScanTime < 3000) return;

      lastCode = code;
      lastScanTime = now;

      if (isProcessing) return;
      isProcessing = true;

      const isbn = code;

      if (!isbn.startsWith("978") && !isbn.startsWith("979")) {
          isProcessing = false;
          return;
      }

      if (!isbn || isbn.length !== 13 || !/^\d{13}$/.test(isbn)) {
          isProcessing = false;
          return;
      }

      const info = await fetchBookInfo(isbn);

      if (!info) {
          alert("書誌データがありません（OpenBDに情報がありません）");
          isProcessing = false;
          return;
      }

      if (isDuplicate(info)) {
          if (!duplicateAlertShown) {
              alert("この本はすでに登録されています");
              duplicateAlertShown = true;
          }
          Quagga.stop();
          showInitial();
          isProcessing = false;
          return;
      }

      const ok = confirm(
          `タイトル：${info.title}\n著者：${info.author}\n\n取り込みますか？`
      );

      if (ok) {
          saveBook(info);   // ★ サ行へ移動
          Quagga.stop();    // ★ カメラ停止
          isProcessing = false;
          return;           // ★ showInitial を呼ばない（スマホ対策）
      }

      duplicateAlertShown = false;

      Quagga.stop();
      showInitial();

      isProcessing = false;
  });
}

/* -----------------------------------
   カメラ停止
----------------------------------- */
function stopCamera() {
  Quagga.stop();
  const cam = document.querySelector('#camera');
  if (cam) cam.innerHTML = "";
  showInitial();
}

/* -----------------------------------
   初期表示
----------------------------------- */
showInitial();

</script>

</body>
</html>
